<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的视频集</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #fff;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, #1f2937, #111827);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #9ca3af;
            font-size: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

        .video-card, .download-card {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .video-card {
            background: #1f2937;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 比例 */
            height: 0;
        }

        .video-container video,
        .video-container iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
        }

        /* 封面层 */
        .video-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url(cover2.jpg) center/cover;
            cursor: pointer;
            z-index: 5;
        }

        /* 播放按钮 */
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .play-btn::after {
            content: "";
            width: 0;
            height: 0;
            margin-left: 6px;
            border-top: 16px solid transparent;
            border-bottom: 16px solid transparent;
            border-left: 26px solid #fff;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* 下载卡片样式 - 16:9 比例，和视频封面一致 */
        .download-card {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 比例，和视频容器一致 */
            height: 0;
            background: url(download-bg.jpg) center/cover;
            overflow: hidden;
        }

        /* 半透明遮罩，让文字更易读 */
        .download-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        /* 下载卡片内容容器，垂直居中 */
        .download-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            padding: 0 1rem;
            text-align: center;
            z-index: 1;
        }

        .download-card h2 {
            font-size: 24px; /* 改为24号 */
            color: #ff0000; /* 改为红色 */
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .download-card p {
            font-size: 24px; /* 改为24号 */
            color: #ff0000; /* 改为红色 */
            margin-bottom: 1.5rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .download-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #2563eb;
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #6b7280;
            font-size: 0.9rem;
        }
        </style>
    </head>
    <body>
        <header>
            <h1>我的视频集</h1>
            <p>生活片段 · 美好记录</p>
        </header>
        <div class="container">
            <div class="video-card">
                <div class="video-container">
                    <video id="v1" controls playsinline allowfullscreen poster="cover1.jpg"><source src="你咋那么美.mp4" type="video/mp4"> 您的浏览器不支持播放视频
                    </video> <button class="fullscreen-btn" onclick="goFull('v1')">全屏</button>
                </div>
            </div> <!-- 遇岩同乐 App 下载卡片（16:9 比例） -->
            <div class="download-card">
                <div class="download-content">
                    <h2>遇岩同乐 App</h2>
                    <p>内置大图标，适配手机端，点击下方按钮下载安装</p> <a class="download-btn" href="https://gitee.com/x21y/an/releases/download/YaX5.1.9手机/YaX_5.1.9.apk" download> 下载遇岩同乐 v5.1.9 </a>
                </div>
            </div>
        </div>
        <footer>
            © 2026 我的视频站
        </footer>
        <script>
        function goFull(id) {
            const v = document.getElementById(id);
            if (v.requestFullscreen) v.requestFullscreen();
            else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
            else if (v.msRequestFullscreen) v.msRequestFullscreen();
        }

        function playBilibili(cover) {
            const iframe = document.getElementById('bili-iframe');
            iframe.src = iframe.src.replace('&autoplay=0', '&autoplay=1');
            cover.style.display = 'none';
        }
    </script>
    </body>
</html>
